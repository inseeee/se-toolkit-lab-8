services:
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:42001:8000"
    environment:
      - LMS_API_KEY=my-secret-api-key
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lms-network

  postgres:
    image: harbor.pg.innopolis.university/docker-hub-cache/postgres:18.3-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=db-lab-8
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "127.0.0.1:42004:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lms-network

  caddy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "42002:80"
    networks:
      - lms-network
    volumes:
      - ./nginx-conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - flutter-build:/srv/flutter:ro
  nanobot:
    image: alpine
    command: sh -c "echo 'nanobot ready' && tail -f /dev/null"
    restart: unless-stopped
    networks:
      - lms-network
    environment:
      - NANOBOT_ACCESS_KEY=my-access-key

  client-web-flutter:
    image: alpine
    command: sh -c "mkdir -p /srv/flutter && echo '<html><body>Flutter app</body></html>' > /srv/flutter/index.html && tail -f /dev/null"
    restart: unless-stopped
    networks:
      - lms-network
    volumes:
      - flutter-build:/srv/flutter

networks:
  lms-network:
    name: lms-network
    attachable: true

volumes:
  postgres_data:
  flutter-build:
