server {
    listen 80;
    
    location /ws/chat {
        return 200 "WebSocket endpoint ready";
        add_header Content-Type text/plain;
    }
    
    location /flutter/ {
        alias /srv/flutter/;
        try_files $uri $uri/ /index.html;
    }
    
    location / {
        return 200 "OK";
    }
}
